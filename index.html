<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Terminal Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #FFB6C1;
    --bg2:       #0c140c;
    --White:     #FFFFFF;
    --green-dim: #00aa2a;
    --green-faint: rgba(0,255,65,0.07);
    --red:       #ff3c3c;
    --amber:     #ffb700;
    --border:    rgba(0,255,65,0.22);
    --glow:      0 0 18px rgba(0,255,65,0.35);
    --font-mono: 'Share Tech Mono', monospace;
    --font-crt:  'VT323', monospace;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    font-family: var(--font-mono);
    color: var(--White);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 100;
    animation: flicker 8s infinite;
  }

  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.65) 100%
    );
    pointer-events: none;
    z-index: 99;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96%            { opacity: 0.92; }
    97%            { opacity: 1; }
    98%            { opacity: 0.95; }
  }

  /* ── TERMINAL WINDOW ── */
  .terminal {
    width: 100%;
    max-width: 720px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: var(--glow), 0 0 60px rgba(0,255,65,0.08), inset 0 0 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    animation: bootup 0.6s ease both;
  }

  @keyframes bootup {
    from { opacity: 0; transform: scaleY(0.02); filter: brightness(3); }
    60%  { opacity: 1; transform: scaleY(1.02); }
    to   { opacity: 1; transform: scaleY(1); filter: brightness(1); }
  }

  /* Title bar */
  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,255,65,0.04);
  }

  .title-bar-dots {
    display: flex;
    gap: 7px;
  }

  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .dot-r { background: #ff5f57; box-shadow: 0 0 6px #ff5f57; }
  .dot-y { background: #ffbd2e; box-shadow: 0 0 6px #ffbd2e; }
  .dot-g { background: #28ca41; box-shadow: 0 0 6px #28ca41; }

  .title-bar-label {
    font-family: var(--font-crt);
    font-size: 1.25rem;
    color: var(--green-dim);
    letter-spacing: 0.1em;
  }

  .title-bar-status {
    font-size: 0.7rem;
    color: var(--green-dim);
    letter-spacing: 0.08em;
  }

  /* Boot text */
  .boot-msg {
    padding: 14px 18px 6px;
    font-size: 0.75rem;
    color: var(--green-dim);
    border-bottom: 1px solid var(--green-faint);
    line-height: 1.6;
    animation: typein 1s steps(60) both;
    overflow: hidden;
    white-space: nowrap;
  }

  @keyframes typein {
    from { width: 0; }
    to   { width: 100%; }
  }

  /* History output */
  .output {
    flex: 1;
    padding: 14px 18px;
    min-height: 280px;
    max-height: 360px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--green-dim) transparent;
  }

  .output::-webkit-scrollbar { width: 4px; }
  .output::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

  .line {
    font-size: 0.9rem;
    line-height: 1.55;
    display: flex;
    gap: 10px;
    align-items: baseline;
    animation: linein 0.15s ease both;
  }

  @keyframes linein {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .line-prompt { color: var(--red); flex-shrink: 0; user-select: none; }
  .line-expr   { color: var(--green); flex: 1; word-break: break-all; }

  .line-result {
    color: var(--amber);
    padding-left: 28px;
    font-family: var(--font-crt);
    font-size: 1.2rem;
    letter-spacing: 0.04em;
  }

  .line-error {
    color: var(--red);
    padding-left: 28px;
    font-size: 0.82rem;
    opacity: 0.9;
  }

  .line-info {
    color: var(--green-dim);
    padding-left: 28px;
    font-size: 0.78rem;
    font-style: italic;
  }

  .line-system {
    color: var(--green-dim);
    font-size: 0.78rem;
    border-top: 1px dashed rgba(0,255,65,0.1);
    margin-top: 6px;
    padding-top: 6px;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 18px;
  }

  /* Input row */
  .input-row {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    gap: 10px;
    border-top: 1px solid var(--border);
    background: rgba(0,255,65,0.02);
  }

  .prompt-label {
    color: var(--red);
    font-size: 0.95rem;
    flex-shrink: 0;
    user-select: none;
    text-shadow: 0 0 8px var(--red);
  }

  #expr-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 0.95rem;
    caret-color: var(--green);
    letter-spacing: 0.03em;
  }

  #expr-input::placeholder { color: rgba(0,255,65,0.25); }

  .cursor-blink {
    display: inline-block;
    width: 9px; height: 1.1em;
    background: var(--green);
    animation: blink 1s step-start infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
    box-shadow: 0 0 6px var(--green);
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Bottom bar */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 18px;
    border-top: 1px solid var(--green-faint);
    font-size: 0.68rem;
    color: var(--green-dim);
    letter-spacing: 0.07em;
  }

  .kbd {
    display: inline-block;
    background: rgba(0,255,65,0.1);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 0.65rem;
    color: var(--green);
    margin: 0 2px;
  }

  /* Quick buttons */
  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 18px 10px;
    border-top: 1px solid var(--green-faint);
  }

  .qbtn {
    background: var(--green-faint);
    border: 1px solid var(--border);
    color: var(--green-dim);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .qbtn:hover {
    background: rgba(0,255,65,0.15);
    color: var(--green);
    box-shadow: 0 0 8px rgba(0,255,65,0.2);
    border-color: rgba(0,255,65,0.4);
  }

  .qbtn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div class="terminal">

  <!-- Title bar -->
  <div class="title-bar">
    <div class="title-bar-dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="title-bar-label">CALC-TERMINAL v1.0</div>
    <div class="title-bar-status" id="status">● READY</div>
  </div>

  <!-- Boot message -->
  <div class="boot-msg" id="bootMsg">
    &gt; Initializing Math Engine... OK &nbsp;|&nbsp; Type an expression and press Enter
  </div>

  <!-- Output history -->
  <div class="output" id="output"></div>

  <div class="divider"></div>

  <!-- Input -->
  <div class="input-row">
    <span class="prompt-label">&gt;&gt;</span>
    <input id="expr-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="e.g.  5 + 7 * 2  or  (10/2) + 3" />
    <span class="cursor-blink"></span>
  </div>

  <!-- Quick insert buttons -->
  <div class="quick-btns">
    <span style="font-size:0.68rem;color:var(--green-dim);align-self:center;">Quick:</span>
    <button class="qbtn" onclick="insert('Math.sqrt(')">√x</button>
    <button class="qbtn" onclick="insert('Math.pow(,2)')">x²</button>
    <button class="qbtn" onclick="insert('Math.PI')">π</button>
    <button class="qbtn" onclick="insert('Math.E')">e</button>
    <button class="qbtn" onclick="insert('Math.abs(')">|x|</button>
    <button class="qbtn" onclick="insert('Math.floor(')">floor(</button>
    <button class="qbtn" onclick="insert('Math.ceil(')">ceil(</button>
    <button class="qbtn" onclick="insert('Math.round(')">round(</button>
    <button class="qbtn" onclick="insert('Math.log(')">log(</button>
    <button class="qbtn" onclick="insert('Math.sin(')">sin(</button>
    <button class="qbtn" onclick="insert('Math.cos(')">cos(</button>
    <button class="qbtn" onclick="clearAll()">CLR</button>
  </div>

  <!-- Bottom shortcuts -->
  <div class="bottom-bar">
    <span><kbd class="kbd">Enter</kbd> Evaluate &nbsp; <kbd class="kbd">↑↓</kbd> History &nbsp; <kbd class="kbd">Ctrl+L</kbd> Clear</span>
    <span id="counter">0 calculations</span>
  </div>

</div>

<script>
  const input   = document.getElementById('expr-input');
  const output  = document.getElementById('output');
  const status  = document.getElementById('status');
  const counter = document.getElementById('counter');

  let history    = [];   // command history for ↑↓ nav
  let histIdx    = -1;
  let calcCount  = 0;

  // ── SAFE EVALUATOR ─────────────────────────────────────────
  function safeEval(expr) {
    // Whitelist: only allow numbers, operators, parens, Math.*, spaces, dots
    const cleaned = expr.trim();
    if (!cleaned) throw new Error("Empty expression");

    // Replace common shortcuts
    let e = cleaned
      .replace(/\^/g, '**')           // 2^3 → 2**3
      .replace(/÷/g, '/')
      .replace(/×/g, '*')
      .replace(/π/g, 'Math.PI')
      .replace(/pi/gi, 'Math.PI');

    // Security: block anything that isn't math
    if (/[a-zA-Z]/.test(e.replace(/Math\.\w+/g, ''))) {
      throw new Error("Invalid characters – only math expressions allowed");
    }

    // eslint-disable-next-line no-new-func
    const result = Function('"use strict"; return (' + e + ')')();

    if (typeof result !== 'number') throw new Error("Result is not a number");
    if (!isFinite(result))          throw new Error("Result is Infinity or NaN – check your expression");

    return result;
  }

  // ── APPEND LINE ────────────────────────────────────────────
  function addLine(cls, html) {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.innerHTML = html;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  function addSystem(msg) {
    const div = document.createElement('div');
    div.className = 'line line-system';
    div.textContent = msg;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  // ── EVALUATE ───────────────────────────────────────────────
  function evaluate() {
    const raw = input.value.trim();
    if (!raw) return;

    // Handle special commands
    if (raw.toLowerCase() === 'clear' || raw.toLowerCase() === 'cls') {
      clearAll(); input.value = ''; return;
    }
    if (raw.toLowerCase() === 'help') {
      showHelp(); input.value = ''; return;
    }

    // Show the input line
    addLine('', `<span class="prompt-label">&gt;&gt;</span>
                 <span class="line-expr">${escHtml(raw)}</span>`);

    try {
      const result = safeEval(raw);
      const formatted = Number.isInteger(result)
        ? result.toLocaleString()
        : parseFloat(result.toPrecision(12)).toLocaleString(undefined, {maximumFractionDigits: 10});

      addLine('', `<span class="line-result">= ${formatted}</span>`);

      calcCount++;
      counter.textContent = calcCount + ' calculation' + (calcCount !== 1 ? 's' : '');
      setStatus('● OK', 'var(--green)');

    } catch (err) {
      addLine('', `<span class="line-error">✖ ERROR: ${escHtml(err.message)}</span>`);
      setStatus('● ERR', 'var(--red)');
      setTimeout(() => setStatus('● READY', ''), 2000);
    }

    // Save to history
    history.unshift(raw);
    if (history.length > 50) history.pop();
    histIdx = -1;
    input.value = '';
  }

  function showHelp() {
    addSystem('─── HELP ───────────────────────────────────────────');
    addLine('', '<span class="line-info">Operators : + - * / ** % (use ^ for power)</span>');
    addLine('', '<span class="line-info">Functions : Math.sqrt(), Math.pow(), Math.abs()</span>');
    addLine('', '<span class="line-info">           Math.sin(), Math.cos(), Math.log()</span>');
    addLine('', '<span class="line-info">Constants : Math.PI, Math.E</span>');
    addLine('', '<span class="line-info">Commands  : clear / cls  →  clear screen</span>');
    addLine('', '<span class="line-info">           help         →  show this help</span>');
    addSystem('────────────────────────────────────────────────────');
  }

  function clearAll() {
    output.innerHTML = '';
    calcCount = 0;
    counter.textContent = '0 calculations';
    setStatus('● READY', '');
    addSystem('Screen cleared. Ready for input.');
  }

  function setStatus(txt, color) {
    status.textContent = txt;
    status.style.color = color || 'var(--green-dim)';
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── QUICK INSERT ───────────────────────────────────────────
  function insert(txt) {
    input.value += txt;
    input.focus();
  }

  // ── KEY HANDLING ───────────────────────────────────────────
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      evaluate();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx < history.length - 1) {
        histIdx++;
        input.value = history[histIdx];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx > 0) {
        histIdx--;
        input.value = history[histIdx];
      } else {
        histIdx = -1;
        input.value = '';
      }
    } else if (e.ctrlKey && e.key === 'l') {
      e.preventDefault();
      clearAll();
    }
  });

  // ── BOOT SEQUENCE ──────────────────────────────────────────
  (function boot() {
    const lines = [
      { t: 400,  fn: () => addSystem('CALC-TERMINAL v1.0  –  Math Expression Evaluator') },
      { t: 700,  fn: () => addSystem('Type "help" for usage guide. Ctrl+L to clear.') },
      { t: 1000, fn: () => addLine('', '<span class="line-info">Ready. Enter your first expression below ↓</span>') },
    ];
    lines.forEach(({ t, fn }) => setTimeout(fn, t));
    setTimeout(() => input.focus(), 1100);
  })();
</script>
</body>
</html>
